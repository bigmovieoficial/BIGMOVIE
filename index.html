<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BigMovie</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: #111;
    }

    header h1 {
      color: red;
      margin: 0;
    }

    .hero {
      padding: 60px 20px;
      background: url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4') center/cover;
      text-align: center;
    }

    .hero h2 {
      font-size: 40px;
    }

    .btn {
      background: red;
      padding: 10px 20px;
      border: none;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      font-size: 16px;
    }

    .movies {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      padding: 20px;
    }

    .movie {
      background: #111;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
    }

    .movie img {
      width: 100%;
      border-radius: 10px;
    }

    .player {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 80%;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: red;
      padding: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h1>BigMovie</h1>
  <button class="btn">Entrar</button>
</header>

<section class="hero">
  <h2>Filmes e Séries Ilimitados</h2>
  <button class="btn">Começar</button>
</section>

<section class="movies">

  <div class="movie" onclick="playVideo()">
    <img src="https://via.placeholder.com/200x300">
    <p>Filme Demo</p>
  </div>

</section>

<div class="player" id="player">
  <div class="close" onclick="closeVideo()">Fechar</div>

  <video controls>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>
</div>

<script>
  function playVideo() {
    document.getElementById('player').style.display = 'flex';
  }

  function closeVideo() {
    document.getElementById('player').style.display = 'none';
  }
</script>

</body>
</html>
